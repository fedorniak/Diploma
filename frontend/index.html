<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLD solver</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>Old Pochmann solver</header>
    <div class="cube-wrapper">
      <!-- Синя грань (B) зверху посередині -->
      <div class="face-row">
        <div class="face B">
          <div class="cell corner c1 cor1"></div>
          <div class="cell edge e1 ed1"></div>
          <div class="cell corner c2 cor2"></div>
          <div class="cell edge e2 ed2"></div>
          <div class="cell center"></div>
          <div class="cell edge e3 ed3"></div>
          <div class="cell corner c3 cor3"></div>
          <div class="cell edge e4 ed4"></div>
          <div class="cell corner c4 cor4"></div>
        </div>
      </div>

      <!-- Оранжева (O), Біла (W), Червона (R) — посередині, по горизонталі -->
      <div class="face-row">
        <div class="face O">
          <div class="cell corner c5 cor1"></div>
          <div class="cell edge e5 ed2"></div>
          <div class="cell corner c6 cor3"></div>
          <div class="cell edge e6 ed12"></div>
          <div class="cell center"></div>
          <div class="cell edge e7 ed5"></div>
          <div class="cell corner c7 cor7"></div>
          <div class="cell edge e8 ed8"></div>
          <div class="cell corner c8 cor5"></div>
        </div>
        <div class="face W">
          <div class="cell corner c9 cor3"></div>
          <div class="cell edge e9 ed4"></div>
          <div class="cell corner c10 cor4"></div>
          <div class="cell edge e10 ed5"></div>
          <div class="cell center"></div>
          <div class="cell edge e11 ed6"></div>
          <div class="cell corner c11 cor5"></div>
          <div class="cell edge e12 ed7"></div>
          <div class="cell corner c12 cor6"></div>
        </div>
        <div class="face R">
          <div class="cell corner c13 cor4"></div>
          <div class="cell edge e13 ed3"></div>
          <div class="cell corner c14 cor2"></div>
          <div class="cell edge e14 ed6"></div>
          <div class="cell center"></div>
          <div class="cell edge e15 ed11"></div>
          <div class="cell corner c15 cor6"></div>
          <div class="cell edge e16 ed9"></div>
          <div class="cell corner c16 cor8"></div>
        </div>
      </div>

      <!-- Зелена грань (G) під білою -->
      <div class="face-row">
        <div class="face G">
          <div class="cell corner c17 cor5"></div>
          <div class="cell edge e17 ed7"></div>
          <div class="cell corner c18 cor6"></div>
          <div class="cell edge e18 ed8"></div>
          <div class="cell center"></div>
          <div class="cell edge e19 ed9"></div>
          <div class="cell corner c19 cor7"></div>
          <div class="cell edge e20 ed10"></div>
          <div class="cell corner c20 cor8"></div>
        </div>
      </div>

      <!-- Жовта грань (Y) під зеленою -->
      <div class="face-row">
        <div class="face Y">
          <div class="cell corner c21 cor7"></div>
          <div class="cell edge e21 ed10"></div>
          <div class="cell corner c22 cor8"></div>
          <div class="cell edge e22 ed12"></div>
          <div class="cell center"></div>
          <div class="cell edge e23 ed11"></div>
          <div class="cell corner c23 cor1"></div>
          <div class="cell edge e24 ed1"></div>
          <div class="cell corner c24 cor2"></div>
        </div>
      </div>
      <button id="sendColors">Зібрати</button>

      <div class="palette" id="palette">
        <div
          class="color-box"
          data-code="R"
          title="Red"
          style="background-color: red"
        ></div>
        <div
          class="color-box"
          data-code="G"
          title="Green"
          style="background-color: green"
        ></div>
        <div
          class="color-box"
          data-code="B"
          title="Blue"
          style="background-color: blue"
        ></div>
        <div
          class="color-box"
          data-code="O"
          title="Orange"
          style="background-color: orange"
        ></div>
        <div
          class="color-box"
          data-code="W"
          title="White"
          style="background-color: white; border: 1px solid #ccc"
        ></div>
        <div
          class="color-box"
          data-code="Y"
          title="Yellow"
          style="background-color: yellow"
        ></div>
      </div>
      <div id="result-area"></div>
      <button id="clearColors">Очистити клітинки</button>
    </div>
    <div id="resultsContainer"></div>
    <footer>Федорняк Сергій</footer>
    <script src="script.js"></script>
  </body>
</html>

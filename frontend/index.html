<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rubik's Cube Solver</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        margin: 0;
        padding: 0;
      }
      .container {
        width: 80%;
        margin: 50px auto;
        padding: 20px;
        background-color: #ffffff;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h1 {
        text-align: center;
        color: #333;
      }
      button {
        display: block;
        width: 200px;
        margin: 20px auto;
        padding: 10px;
        font-size: 16px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      button:hover {
        background-color: #45a049;
      }
      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        text-align: left;
      }
      th,
      td {
        padding: 10px;
        border: 1px solid #ddd;
        text-align: center;
      }
      th {
        background-color: #f2f2f2;
        font-weight: bold;
      }
      td {
        background-color: #f9f9f9;
      }
      .parity {
        color: red;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Rubik's Cube Solver</h1>
      <button onclick="sendRequest()">Solve Cube</button>

      <table id="cornersTable">
        <thead>
          <tr>
            <th>Corners</th>
            <th>Solution</th>
          </tr>
        </thead>
        <tbody>
          <!-- Corner solutions will go here -->
        </tbody>
      </table>

      <table id="edgesTable">
        <thead>
          <tr>
            <th>Edges</th>
            <th>Solution</th>
          </tr>
        </thead>
        <tbody>
          <!-- Edge solutions will go here -->
        </tbody>
      </table>

      <table id="parityTable">
        <thead>
          <tr>
            <th>Parity</th>
            <th>Solution</th>
          </tr>
        </thead>
        <tbody>
          <!-- Parity solution will go here -->
        </tbody>
      </table>
    </div>

    <script>
      async function sendRequest() {
        const response = await fetch("http://127.0.0.1:8000/api/solve/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            edges: "WOYGBGGWORYYBGORRBBWOWYR",
            corners: "YWOGGWBBBOOGYOWRYRRYWBRG",
          }),
        });

        const data = await response.json();
        console.log(data);

        // Populate the Corners table
        const cornersTable = document
          .getElementById("cornersTable")
          .getElementsByTagName("tbody")[0];
        data.corner_solution.forEach((corner) => {
          const row = cornersTable.insertRow();
          const cell1 = row.insertCell(0);
          const cell2 = row.insertCell(1);
          cell1.innerHTML = corner[0];
          cell2.innerHTML = corner[1];
        });

        // Populate the Edges table
        const edgesTable = document
          .getElementById("edgesTable")
          .getElementsByTagName("tbody")[0];
        data.edge_solution.forEach((edge) => {
          const row = edgesTable.insertRow();
          const cell1 = row.insertCell(0);
          const cell2 = row.insertCell(1);
          cell1.innerHTML = edge[0];
          cell2.innerHTML = edge[1];
        });

        // Populate the Parity table if needed
        const parityTable = document
          .getElementById("parityTable")
          .getElementsByTagName("tbody")[0];
        if (data.parity !== "None") {
          const row = parityTable.insertRow();
          const cell1 = row.insertCell(0);
          const cell2 = row.insertCell(1);
          cell1.innerHTML = "Parity";
          cell2.innerHTML = data.parity;
          cell2.classList.add("parity");
        } else {
          const row = parityTable.insertRow();
          const cell1 = row.insertCell(0);
          const cell2 = row.insertCell(1);
          cell1.innerHTML = "No Parity";
          cell2.innerHTML = "";
        }
      }
    </script>
  </body>
</html>
